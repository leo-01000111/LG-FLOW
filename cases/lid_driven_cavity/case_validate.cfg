# LG-Flow — Lid-Driven Cavity Validation Config (Phase 7 / CI)
# Reduced resolution + small dt for stable explicit Euler integration.
# Numerical stability of explicit momentum predictor requires:
#   dt < 0.5 * dx^2 / nu  (viscous CFL)
# For Nx=Ny=32: dx = 1/32, dt_max = 0.5*(1/32)^2/0.01 = 0.049
# Using dt = 0.001 gives safety factor ~50x on viscous CFL.
#
# Reference: Ghia et al. (1982) Re=100 benchmark.
# NOTE: 32x32 is coarser than Ghia's 129x129; error metrics will be ~O(dx).

# Mesh
mesh.Nx  = 32
mesh.Ny  = 32
mesh.Lx  = 1.0
mesh.Ly  = 1.0

# Time stepping (small dt for explicit Euler stability at this resolution)
solver.dt          = 0.001
solver.max_iter    = 500
solver.tolerance   = 1e-5

# Fluid properties (Re = U*L/nu = 1.0*1.0/0.01 = 100)
solver.rho = 1.0
solver.nu  = 0.01

# Under-relaxation
solver.alpha_u = 0.7
solver.alpha_p = 0.3

# Boundary conditions: moving lid on top, no-slip walls elsewhere
bc.top.type    = WALL
bc.top.value   = 1.0
bc.bottom.type = WALL
bc.left.type   = WALL
bc.right.type  = WALL

# Output
output.vtk_interval = 100
output.dir          = output/lid_driven_cavity
