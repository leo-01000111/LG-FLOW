# ─────────────────────────────────────────────────────────────────────────────
# LG-Flow — Lid-Driven Cavity Configuration
# Canonical validation case: Re = 100 (nu = 0.01, U_lid = 1.0, L = 1.0)
# Reference: Ghia et al. (1982) J. Comput. Phys. 48(3), 387-411
# ─────────────────────────────────────────────────────────────────────────────

# Mesh
mesh.Nx  = 64
mesh.Ny  = 64
mesh.Lx  = 1.0
mesh.Ly  = 1.0

# Time stepping / iteration control
solver.dt          = 0.01
solver.max_iter    = 5000
solver.tolerance   = 1e-6

# Fluid properties (SI units)
# Re = U * L / nu = 1.0 * 1.0 / 0.01 = 100
solver.rho = 1.0
solver.nu  = 0.01

# Boundary conditions
# top: moving lid at U = 1 m/s in x-direction
bc.top.type    = WALL
bc.top.value   = 1.0

# stationary walls
bc.bottom.type = WALL
bc.left.type   = WALL
bc.right.type  = WALL

# Output
output.vtk_interval = 100
output.dir          = output/lid_driven_cavity
